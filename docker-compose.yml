version: "3.9"

# ─── Production Docker Compose ────────────────────────────────────────────────
# Usage:
#   1. Copy .env.example to .env and fill in all required values.
#   2. docker compose up -d
#
# Secrets are injected via environment variables — never hardcoded here.
# The .env file must NOT be committed to source control.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: accounting_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accounting_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-accounting_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounting_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-accounting_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD};Pooling=true;MinPoolSize=2;MaxPoolSize=20;CommandTimeout=30"
      Auth__JwtSecret: ${JWT_SECRET}
      Auth__JwtIssuer: ${JWT_ISSUER:-accounting-api}
      Auth__JwtAudience: ${JWT_AUDIENCE:-accounting-client}
      Auth__AccessTokenMinutes: ${ACCESS_TOKEN_MINUTES:-60}
      Auth__AdminUsername: ${ADMIN_USERNAME:-admin}
      Auth__AdminEmail: ${ADMIN_EMAIL}
      Auth__AdminPassword: ${ADMIN_PASSWORD}
      AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal
      - external

  # ── Frontend (Nginx serving Vite build) ─────────────────────────────────────
  # Requires frontend/Dockerfile to exist (see .env.example for build instructions).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accounting_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - external

  # ── pgAdmin (dev profile only — not started in production) ──────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: accounting_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@accounting.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - internal

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  backend_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  # postgres is only reachable by the api — not exposed to the host or frontend
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

